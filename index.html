<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khatia News</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0b0f;
    color:white;
    overflow-x:hidden;
}

/* 🌊 BACKGROUND */
.bg{
    position:fixed;
    width:100%;
    height:100%;
    background:linear-gradient(120deg,#2b0000,#5c0000,#0b0b0f,#8b0000);
    background-size:400% 400%;
    animation:bg 10s infinite alternate;
    filter:blur(30px);
    z-index:-2;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    100%{background-position:100% 50%;}
}

/* HEADER */
header{
    text-align:center;
    padding:25px;
    font-size:40px;
    color:#ffcc00;
    text-shadow:0 0 20px #ff0000;
}

.ornament{
    text-align:center;
    color:#ffcc00;
    margin-bottom:15px;
}

/* NAV */
nav{
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

nav a{
    text-decoration:none;
    color:white;
    padding:10px 15px;
    border:1px solid #ffcc00;
    border-radius:20px;
    transition:0.3s;
}

nav a:hover{
    background:#ffcc00;
    color:black;
}

/* BUTTON */
.centerBtn{
    text-align:center;
    margin:20px;
}

button{
    padding:10px 20px;
    background:#ffcc00;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}

/* POSTS */
.form{
    text-align:center;
    margin:20px;
    display:none;
}

input{
    padding:10px;
    margin:5px;
    border-radius:10px;
    border:none;
    outline:none;
}

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:rgba(255,255,255,0.05);
    border:1px solid #ffcc00;
    border-radius:15px;
    padding:15px;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px #ffcc00;
}

.card h3{
    color:#ffcc00;
}

/* POPUP */
#popup{
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.7);
    justify-content:center;
    align-items:center;
}

.popupBox{
    background:#111;
    padding:25px;
    border-radius:15px;
    text-align:center;
    width:280px;
    box-shadow:0 0 20px #ffcc00;
}

.popupBox input{
    width:90%;
    margin:10px 0;
}

#msg{
    margin-top:10px;
}

/* MOUSE EFFECT */
.dot{
    position:fixed;
    width:7px;
    height:7px;
    background:#ffcc00;
    border-radius:50%;
    pointer-events:none;
    box-shadow:0 0 10px red;
}

/* FOOTER */
footer{
    text-align:center;
    padding:20px;
    color:#ffcc00;
    border-top:1px solid #ffcc00;
    margin-top:30px;
}

</style>
</head>

<body>

<div class="bg"></div>

<header>📰 KHATIA NEWS</header>
<div class="ornament">❖ ქართული საინფორმაციო სააგენტო ❖</div>

<nav>
<a href="#">მთავარი</a>
<a href="#">პოლიტიკა</a>
<a href="#">სპორტი</a>
<a href="#">კულტურა</a>
<a href="#">ეკონომიკა</a>
</nav>

<!-- LOGIN BUTTON -->
<div class="centerBtn">
<button onclick="openLogin()">🔐 Admin Login</button>
</div>

<!-- POPUP LOGIN -->
<div id="popup">
    <div class="popupBox">
        <h2 style="color:#ffcc00;">Admin Login</h2>

        <input type="password" id="pass" placeholder="Password">

        <button onclick="login()">Login</button>
        <button onclick="closeLogin()" style="background:none;color:white;">Close</button>

        <p id="msg"></p>
    </div>
</div>

<!-- FORM -->
<div class="form" id="form">
    <input id="title" placeholder="სათაური">
    <input id="text" placeholder="ტექსტი">
    <button onclick="addPost()">დამატება</button>
</div>

<!-- POSTS -->
<div id="posts" class="container">

<div class="card">
<h3>თბილისში ახალი პროექტები</h3>
<p>ქალაქში ინფრასტრუქტურა ვითარდება...</p>
</div>

<div class="card">
<h3>სპორტი</h3>
<p>ნაკრები ემზადება ახალ მატჩისთვის...</p>
</div>

<div class="card">
<h3>ეკონომიკა</h3>
<p>ბაზარზე სტაბილურობა შეინიშნება...</p>
</div>

</div>

<footer>
© 2026 Khatia News
</footer>

<script>

/* 🔐 POPUP */
function openLogin(){
    document.getElementById("popup").style.display="flex";
}

function closeLogin(){
    document.getElementById("popup").style.display="none";
    document.getElementById("msg").innerText="";
}

/* LOGIN */
function login(){
    let pass=document.getElementById("pass").value;

    if(pass==="admin123"){
        document.getElementById("msg").style.color="lightgreen";
        document.getElementById("msg").innerText="✔ Access Granted";

        setTimeout(()=>{
            closeLogin();
            document.getElementById("form").style.display="block";
        },1000);

    }else{
        document.getElementById("msg").style.color="red";
        document.getElementById("msg").innerText="❌ Wrong Password!";
    }
}

/* ➕ ADD POST */
function addPost(){
    let title=document.getElementById("title").value;
    let text=document.getElementById("text").value;

    if(title=="" || text==""){
        alert("შეავსე ორივე ველი!");
        return;
    }

    let div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
        <h3>${title}</h3>
        <p>${text}</p>
    `;

    document.getElementById("posts").appendChild(div);

    document.getElementById("title").value="";
    document.getElementById("text").value="";
}

/* ✨ MOUSE EFFECT */
document.addEventListener("mousemove",(e)=>{
    let d=document.createElement("div");
    d.className="dot";
    d.style.left=e.pageX+"px";
    d.style.top=e.pageY+"px";
    document.body.appendChild(d);

    setTimeout(()=>d.remove(),400);
});

</script>

</body>
</html>
