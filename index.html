<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON GAMING STORE</title>

<style>
body{
    margin:0;
    font-family:Arial;
    color:white;
    overflow-x:hidden;
    background:black;
}

/* 🌌 ANIMATED BACKGROUND */
.bg{
    position:fixed;
    width:100%;
    height:100%;
    background:linear-gradient(120deg,#0f0c29,#302b63,#ff00cc,#00f7ff,#0f0c29);
    background-size:400% 400%;
    animation:bg 10s infinite alternate;
    z-index:-2;
    filter:blur(30px);
}

@keyframes bg{
    0%{background-position:0% 50%;}
    100%{background-position:100% 50%;}
}

/* 🎮 HEADER */
header{
    text-align:center;
    padding:20px;
    font-size:40px;
    color:#00f7ff;
    text-shadow:0 0 20px #00f7ff;
}

/* 🧭 MENU */
nav{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

nav a{
    text-decoration:none;
    color:white;
    padding:10px 20px;
    border:1px solid #00f7ff;
    border-radius:20px;
    transition:0.3s;
}

nav a:hover{
    background:#00f7ff;
    color:black;
    box-shadow:0 0 20px #00f7ff;
}

/* 📦 CATEGORIES */
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:30px;
}

.card{
    height:150px;
    background:rgba(255,255,255,0.05);
    border:1px solid #00f7ff;
    border-radius:15px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:20px;
    transition:0.4s;
    box-shadow:0 0 10px #00f7ff;
    cursor:pointer;
}

.card:hover{
    transform:scale(1.1) rotateY(10deg);
    box-shadow:0 0 30px #ff00cc;
}

/* 🎮 JOYSTICK DESIGN */
.joystick{
    position:fixed;
    bottom:20px;
    right:20px;
    width:120px;
    height:120px;
    border-radius:50%;
    background:rgba(255,255,255,0.05);
    border:2px solid #00f7ff;
    box-shadow:0 0 20px #00f7ff;
}

.stick{
    width:40px;
    height:40px;
    background:#ff00cc;
    border-radius:50%;
    position:absolute;
    top:40px;
    left:40px;
    box-shadow:0 0 20px #ff00cc;
}

/* ✨ FLOATING DOTS */
.dot{
    position:fixed;
    width:6px;
    height:6px;
    background:#00f7ff;
    border-radius:50%;
    pointer-events:none;
    box-shadow:0 0 10px #00f7ff;
}

</style>
</head>

<body>

<div class="bg"></div>

<header>🔥 NEON GAMING STORE 🔥</header>

<nav>
<a href="#">Home</a>
<a href="#">Games</a>
<a href="#">Action</a>
<a href="#">Racing</a>
<a href="#">RPG</a>
<a href="#">Settings</a>
</nav>

<div class="container">
<div class="card">🎮 Action Games</div>
<div class="card">🚗 Racing Games</div>
<div class="card">⚔ RPG Worlds</div>
<div class="card">🔫 Shooter Zone</div>
<div class="card">🌌 Cyberpunk</div>
<div class="card">🧙 Fantasy</div>
<div class="card">🕹 Multiplayer</div>
<div class="card">🎧 Music Games</div>
</div>

<!-- JOYSTICK -->
<div class="joystick">
<div class="stick"></div>
</div>

<script>

/* ✨ MOUSE MAGIC DOTS */
document.addEventListener("mousemove",(e)=>{
    let d=document.createElement("div");
    d.className="dot";
    d.style.left=e.pageX+"px";
    d.style.top=e.pageY+"px";
    document.body.appendChild(d);

    setTimeout(()=>d.remove(),400);
});

</script>

</body>
</html>
