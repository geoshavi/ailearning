<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>მოხტუნავე ფეხბურთის ბურთი</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: radial-gradient(circle, #228b22, #006400); /* მწვანე მინდვრის ეფექტი */
            display: flex;
            justify-content: center;
            align-items: flex-end; /* ბურთი ვარდება დაბლა */
            overflow: hidden;
        }

        /* ბურთის სტილი */
        .football {
            width: 100px;
            height: 100px;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/d/d3/Soccerball.svg');
            background-size: cover;
            background-position: center;
            border-radius: 50%;
            position: absolute;
            bottom: 500px; /* საწყისი სიმაღლე, საიდანაც ვარდება */
            
            /* ანიმაციის მიბმა */
            animation: dropAndBounce 2s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite alternate,
                      rotateBall 4s linear infinite;
        }

        /* ბალახის/მიწის ხაზი */
        .ground {
            width: 100%;
            height: 20px;
            background-color: #004d00;
            position: absolute;
            bottom: 0;
        }

        /* ჩამოვარდნისა და ახტომის ეფექტი (გრავიტაცია) */
        @keyframes dropAndBounce {
            0% {
                bottom: 600px; /* მაქსიმალური სიმაღლე */
                animation-timing-function: ease-in; /* ვარდება სწრაფად */
            }
            50% {
                bottom: 20px; /* ეხება მიწას */
                transform: scaleY(0.8) scaleX(1.1); /* მიწაზე დაცემისას ცოტათი იჭყლიტება რეალისტურობისთვის */
                animation-timing-function: ease-out; /* მაღლა ადის ნელა */
            }
            55% {
                transform: scaleY(1) scaleX(1); /* ჰაერში ფორმას იბრუნებს */
            }
            100% {
                bottom: 300px; /* მეორე ახტომაზე უფრო დაბლა ადის */
                animation-timing-function: ease-in;
            }
        }

        /* ბურთის ტრიალის ეფექტი */
        @keyframes rotateBall {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>

    <div class="football"></div>

    <div class="ground"></div>

</body>
</html>
