<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON GAMING ZONE</title>

<style>
body{
    margin:0;
    overflow-x:hidden;
    font-family:Arial, sans-serif;
    background:black;
    color:white;
}

/* ===== BACKGROUND NEON GRADIENT ===== */
.background{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    background:linear-gradient(120deg,#0f0c29,#302b63,#24243e);
    z-index:-3;
    animation: bgMove 10s infinite alternate;
}

@keyframes bgMove{
    0%{filter:hue-rotate(0deg);}
    100%{filter:hue-rotate(90deg);}
}

/* ===== PARTICLES ===== */
canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-2;
}

/* ===== HEADER ===== */
header{
    text-align:center;
    padding:30px;
    font-size:40px;
    font-weight:bold;
    color:#00f7ff;
    text-shadow:0 0 20px #00f7ff;
}

/* ===== SLIDER ===== */
.slider{
    width:80%;
    margin:40px auto;
    overflow:hidden;
    border-radius:20px;
    box-shadow:0 0 20px #00f7ff;
}

.slides{
    display:flex;
    width:300%;
    animation:slide 12s infinite;
}

.slides img{
    width:100%;
}

@keyframes slide{
    0%{transform:translateX(0);}
    33%{transform:translateX(-100%);}
    66%{transform:translateX(-200%);}
    100%{transform:translateX(0);}
}

/* ===== BUTTON ===== */
.btn{
    display:inline-block;
    padding:15px 30px;
    margin:20px;
    background:#00f7ff;
    color:black;
    border-radius:30px;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 0 15px #00f7ff;
}

.btn:hover{
    transform:scale(1.1);
}

/* ===== CARDS ===== */
.cards{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
    padding:40px;
}

.card{
    width:250px;
    background:rgba(255,255,255,0.05);
    border:1px solid #00f7ff;
    border-radius:15px;
    padding:15px;
    text-align:center;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-10px);
    box-shadow:0 0 25px #00f7ff;
}

/* ===== MOUSE TRAIL DOT ===== */
.dot{
    position:fixed;
    width:10px;
    height:10px;
    background:#00f7ff;
    border-radius:50%;
    pointer-events:none;
    box-shadow:0 0 10px #00f7ff;
}

</style>
</head>

<body>

<div class="background"></div>
<canvas id="particles"></canvas>

<header>🔥 NEON GAMING ZONE 🔥</header>

<!-- MUSIC -->
<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/10/25/audio_3c1b1d0a7d.mp3?filename=cyberpunk-ambient-121747.mp3">
</audio>

<div style="text-align:center;">
<button class="btn" onclick="document.getElementById('music').play()">
▶ Play Music
</button>
</div>

<!-- SLIDER -->
<div class="slider">
<div class="slides">
<img src="https://images.unsplash.com/photo-1542751371-adc38448a05e">
<img src="https://images.unsplash.com/photo-1552820728-8b83bb6b773f">
<img src="https://images.unsplash.com/photo-1598550476439-6847785fcea6">
</div>
</div>

<!-- CARDS -->
<div class="cards">
<div class="card">🎮 FPS Games</div>
<div class="card">🏎 Racing</div>
<div class="card">⚔ RPG Worlds</div>
<div class="card">🌌 Cyberpunk Style</div>
</div>

<script>

/* ===== PARTICLES ===== */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<80;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*3,
        dx:(Math.random()-0.5)*2,
        dy:(Math.random()-0.5)*2
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="#00f7ff";

    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fill();

        p.x += p.dx;
        p.y += p.dy;

        if(p.x<0 || p.x>canvas.width) p.dx *= -1;
        if(p.y<0 || p.y>canvas.height) p.dy *= -1;
    });

    requestAnimationFrame(draw);
}

draw();

/* ===== MOUSE TRAIL ===== */
document.addEventListener("mousemove",(e)=>{
    let dot = document.createElement("div");
    dot.className="dot";
    dot.style.left = e.pageX+"px";
    dot.style.top = e.pageY+"px";
    document.body.appendChild(dot);

    setTimeout(()=>dot.remove(),300);
});

</script>

</body>
</html>
